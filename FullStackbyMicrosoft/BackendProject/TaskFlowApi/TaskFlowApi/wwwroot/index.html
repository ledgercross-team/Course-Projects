<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TaskFlow API Tester</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 40px;
            max-width: 600px;
        }

        .task-container {
            margin-bottom: 20px;
            padding: 15px;
            border: 1px solid #ccc;
            border-radius: 5px;
        }

        .task-item {
            display: flex;
            justify-content: space-between;
            padding: 8px 0;
            border-bottom: 1px solid #eee;
        }

        input[type="text"] {
            padding: 8px;
            width: 70%;
        }

        button {
            padding: 8px 15px;
            cursor: pointer;
        }
    </style>
</head>
<body>

    <h2>TaskFlow Dashboard</h2>

    <div class="task-container">
        <h3>Add a New Task</h3>
        <input type="text" id="newTaskTitle" placeholder="Enter task title...">
        <button onclick="addTask()">Create Task</button>
    </div>

    <div class="task-container">
        <h3>Current Tasks</h3>
        <div id="taskList">Loading tasks...</div>
    </div>

    <script>
        const apiUrl = '/api/tasks';

        // Fetch and display all tasks
        async function loadTasks() {
            try {
                const response = await fetch(apiUrl);
                const tasks = await response.json();

                const taskList = document.getElementById('taskList');
                taskList.innerHTML = '';

                if (tasks.length === 0) {
                    taskList.innerHTML = '<p>No tasks found. Create one above!</p>';
                    return;
                }

                tasks.forEach(task => {
                    const div = document.createElement('div');
                    div.className = 'task-item';

                    // Added a button here that calls toggleTaskStatus()
                    div.innerHTML = `
                        <span><strong>ID:</strong> ${task.id} | <strong>Title:</strong> ${task.title}</span>
                        <div>
                            <span style="margin-right: 15px;">${task.isCompleted ? '✅ Done' : '⏳ Pending'}</span>
                            <button onclick="toggleTaskStatus(${task.id}, '${task.title}', ${task.isCompleted})">
                                ${task.isCompleted ? 'Mark Pending' : 'Mark Done'}
                            </button>
                        </div>
                    `;
                    taskList.appendChild(div);
                });
            } catch (error) {
                console.error("Error fetching tasks:", error);
                document.getElementById('taskList').innerHTML = '<p style="color:red;">Error loading tasks. Is the API running?</p>';
            }
        }

        // Send a new task to the API
        async function addTask() {
            const titleInput = document.getElementById('newTaskTitle');
            const title = titleInput.value.trim();

            if (!title) {
                alert("Please enter a task title.");
                return;
            }

            const newTask = {
                title: title,
                isCompleted: false
            };

            try {
                const response = await fetch(apiUrl, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(newTask)
                });

                if (response.ok) {
                    titleInput.value = '';
                    loadTasks();
                } else {
                    alert("Failed to create task.");
                }
            } catch (error) {
                console.error("Error creating task:", error);
            }
        }

        // NEW: Update an existing task's status (Testing the PUT endpoint)
        async function toggleTaskStatus(id, title, currentStatus) {
            // Flip the status to the opposite of what it currently is
            const updatedTask = {
                id: id,
                title: title,
                isCompleted: !currentStatus
            };

            try {
                const response = await fetch(`${apiUrl}/${id}`, {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(updatedTask)
                });

                // A successful PUT usually returns a 204 No Content
                if (response.ok || response.status === 204) {
                    loadTasks(); // Refresh the list to show the new status
                } else {
                    alert("Failed to update task status.");
                }
            } catch (error) {
                console.error("Error updating task:", error);
            }
        }

        // Load tasks automatically when the page opens
        loadTasks();
    </script>
</body>
</html>
